; PHP runtime optimizations for Laravel + Docker

memory_limit = 512M
max_execution_time = 120
max_input_time = 120
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Realpath cache (clave en macOS/Windows con bind-mount)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Session cleanup
session.gc_maxlifetime = 7200

; Date
date.timezone = UTC

; Errors
display_errors = Off
log_errors = On

expose_php = Off